name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
      - run: pip install ruff
      - run: ruff check .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
      - run: pip install mistune pytest
      - run: python -m pytest tests/ -v

  build-secp256k1-mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
      - run: pip install mistune
      - name: Clone secp256k1 backup
        run: git clone --depth 1 https://github.com/bitcoin-data/github-metadata-backup-bitcoin-core-secp256k1.git backup
      - name: Build mirror
        run: |
          python build.py \
            --input backup \
            --output public \
            --title "secp256k1 GitHub Mirror" \
            --owner bitcoin-core \
            --repository secp256k1 \
            --markdown
      - name: Verify output
        run: |
          test -f public/index.html
          test -f public/index.json
          test -f public/graph.json
          test -d public/contributors
          test -d public/labels
          test -f public/llms.txt
          html_count=$(find public -mindepth 2 -maxdepth 2 -regextype posix-extended -regex 'public/[0-9]+/index\.html' | wc -l)
          md_count=$(find public -mindepth 2 -maxdepth 2 -regextype posix-extended -regex 'public/[0-9]+/index\.md' | wc -l)
          echo "Entry pages: $html_count HTML, $md_count Markdown"
          test "$html_count" -gt 0
          test "$html_count" = "$md_count"
